<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>West Lake Hiking Trails</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #map { width: 100vw; height: 100vh; }

.panel {
  position: absolute;
  z-index: 1000;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  padding: 11px 24px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 6px 22px rgba(0, 0, 0, 0.16);
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.72);
}

.brand-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  line-height: 1.15;
  color: #1f2a1f;
}

  .track-panel {
    position: absolute; z-index: 1000; bottom: 18px; left: 14px;
    width: 360px; max-width: calc(100vw - 28px); max-height: 52vh;
    background: rgba(255,255,255,.94); border-radius: 12px;
    box-shadow: 0 2px 14px rgba(0,0,0,.16);
    font-size: 13px; overflow: hidden; display: flex; flex-direction: column;
  }
  .track-panel-header {
    padding: 10px 12px 8px; border-bottom: 1px solid rgba(0,0,0,.08);
  }
  .track-panel-title { font-weight: 700; margin-bottom: 8px; }
  .toolbar { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .toolbar button {
    border: 1px solid rgba(0,0,0,.16); background: #fff; border-radius: 8px;
    padding: 5px 8px; font-size: 12px; cursor: pointer;
  }
  .toolbar button:hover { background: #f4f4f4; }
  .search {
    width: 100%; box-sizing: border-box; border: 1px solid rgba(0,0,0,.16);
    border-radius: 8px; padding: 7px 9px; font-size: 13px;
  }
  .tree {
    overflow: auto; padding: 8px 8px 10px;
  }
  details { margin: 2px 0; }
  summary {
    cursor: pointer; user-select: none; padding: 5px 6px; border-radius: 7px;
    font-weight: 650;
  }
  summary:hover { background: rgba(0,0,0,.05); }
  .month summary { font-weight: 600; margin-left: 10px; }
  .track-item {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 8px 6px 28px; border-radius: 8px; cursor: pointer;
    line-height: 1.25;
  }
  .track-item:hover { background: rgba(0,0,0,.06); }
  .track-item.active { background: rgba(0,0,0,.10); font-weight: 650; }
  .swatch {
    width: 16px; height: 4px; border-radius: 3px; flex: 0 0 auto;
  }
  .track-date { font-variant-numeric: tabular-nums; color: #444; white-space: nowrap; }
  .track-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { color: #666; padding: 10px; display: none; }

  .opacity-panel {
    position: absolute; z-index: 1000; right: 14px; bottom: 18px;
    background: rgba(255,255,255,.92); padding: 10px 12px; border-radius: 12px;
    box-shadow: 0 2px 14px rgba(0,0,0,.16); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .opacity-panel input { width: 140px; }
  .opacity-panel label { font-weight: 600; }
  .opacity-panel span { min-width: 36px; text-align: right; }

  @media (max-width: 640px) {
    .track-panel { width: calc(100vw - 28px); max-height: 45vh; }
    .opacity-panel { right: 14px; bottom: calc(45vh + 34px); }
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <div class="brand-title">West Lake Hiking Trails</div>
</div>

<div class="track-panel">
  <div class="track-panel-header">
    <div class="track-panel-title">轨迹</div>
    <div class="toolbar">
      <button id="showAllBtn">全部</button>
      <button id="recentBtn">最近10条</button>
      <button id="clearBtn">清空选择</button>
    </div>
    <input class="search" id="searchInput" placeholder="搜索日期或地点，例如 龙井、九溪、2026-06">
  </div>
  <div class="tree" id="trackTree"></div>
  <div class="empty" id="emptyBox">没有匹配的轨迹。</div>
</div>

<div class="opacity-panel">
  <label for="baseOpacity">底图透明度</label>
  <input id="baseOpacity" type="range" min="0" max="100" value="30">
  <span id="baseOpacityValue">30%</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { preferCanvas: true, zoomControl: true });
const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  opacity: 0.30,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const baseOpacity = document.getElementById('baseOpacity');
const baseOpacityValue = document.getElementById('baseOpacityValue');
baseOpacity.addEventListener('input', () => {
  const value = Number(baseOpacity.value) / 100;
  baseLayer.setOpacity(value);
  baseOpacityValue.textContent = `${baseOpacity.value}%`;
});

const colors = [
  "#d73027", "#4575b4", "#1a9850", "#984ea3", "#ff7f00", "#a65628", "#f781bf",
  "#4daf4a", "#377eb8", "#e41a1c", "#666666", "#66c2a5", "#fc8d62", "#8da0cb",
  "#a6d854", "#ffd92f", "#e5c494", "#b3b3b3", "#1b9e77", "#d95f02", "#7570b3"
];

const trackTree = document.getElementById('trackTree');
const emptyBox = document.getElementById('emptyBox');
const searchInput = document.getElementById('searchInput');

let trackGroups = [];
let selectedIndex = null;
let allBounds = [];
let recentMode = false;

function normalizeDate(dateText) {
  if (!dateText) return "未知日期";
  return dateText;
}

function yearOf(dateText) {
  return /^\d{4}-\d{2}-\d{2}/.test(dateText) ? dateText.slice(0, 4) : "未知年份";
}

function monthOf(dateText) {
  return /^\d{4}-\d{2}-\d{2}/.test(dateText) ? dateText.slice(5, 7) + "月" : "未知月份";
}

function labelOf(track) {
  const p = track.properties;
  return `${p.date || ""} ${p.title || ""}`.trim();
}

function setVisibilityMode(mode, index = null) {
  selectedIndex = index;

  trackGroups.forEach((group, i) => {
    const isSelected = selectedIndex === i;

    group.lines.forEach(line => {
      if (mode === "clear") {
        if (map.hasLayer(line)) map.removeLayer(line);
        return;
      }

      if (!map.hasLayer(line)) line.addTo(map);

      if (selectedIndex === null) {
        line.setStyle({ weight: 3.5, opacity: group.temporarilyHidden ? 0 : 0.82 });
      } else {
        line.setStyle({
          weight: isSelected ? 6 : 2.5,
          opacity: isSelected ? 1 : 0.16
        });
        if (isSelected) line.bringToFront();
      }
    });
  });

  document.querySelectorAll('.track-item').forEach((el, i) => {
    el.classList.toggle('active', selectedIndex === i);
  });
}

function selectTrack(index) {
  if (selectedIndex === index) {
    selectedIndex = null;
    setVisibilityMode("all");
  } else {
    setVisibilityMode("select", index);
    const bounds = [];
    trackGroups[index].lines.forEach(line => bounds.push(...line.getLatLngs()));
    if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
  }
}

function showAll() {
  recentMode = false;
  selectedIndex = null;
  trackGroups.forEach(g => g.temporarilyHidden = false);
  setVisibilityMode("all");
  renderTree();
  if (allBounds.length) map.fitBounds(allBounds, { padding: [25, 25] });
}

function showRecent(limit = 10) {
  recentMode = true;
  selectedIndex = null;

  const sorted = [...trackGroups].sort((a, b) => {
    const da = a.properties.date || "";
    const db = b.properties.date || "";
    return db.localeCompare(da);
  });
  const keep = new Set(sorted.slice(0, limit).map(g => g.index));

  trackGroups.forEach((g) => {
    g.temporarilyHidden = !keep.has(g.index);
    g.lines.forEach(line => {
      if (g.temporarilyHidden) {
        if (map.hasLayer(line)) map.removeLayer(line);
      } else {
        if (!map.hasLayer(line)) line.addTo(map);
        line.setStyle({ weight: 3.5, opacity: 0.82 });
      }
    });
  });

  renderTree();
  const bounds = [];
  trackGroups.filter(g => !g.temporarilyHidden).forEach(g => {
    g.lines.forEach(line => bounds.push(...line.getLatLngs()));
  });
  if (bounds.length) map.fitBounds(bounds, { padding: [25, 25] });
}

function clearSelection() {
  selectedIndex = null;
  trackGroups.forEach(g => g.temporarilyHidden = false);
  setVisibilityMode("all");
  document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
}

function renderTree() {
  const query = searchInput.value.trim().toLowerCase();
  trackTree.innerHTML = "";

  let tracks = trackGroups.filter(g => !g.temporarilyHidden || !recentMode);
  if (recentMode) tracks = trackGroups.filter(g => !g.temporarilyHidden);

  if (query) {
    tracks = tracks.filter(g => labelOf(g).toLowerCase().includes(query));
  }

  tracks.sort((a, b) => {
    const da = a.properties.date || "";
    const db = b.properties.date || "";
    return db.localeCompare(da) || String(a.properties.title).localeCompare(String(b.properties.title));
  });

  const grouped = new Map();
  tracks.forEach(g => {
    const y = yearOf(g.properties.date);
    const m = monthOf(g.properties.date);
    if (!grouped.has(y)) grouped.set(y, new Map());
    if (!grouped.get(y).has(m)) grouped.get(y).set(m, []);
    grouped.get(y).get(m).push(g);
  });

  const years = Array.from(grouped.keys()).sort((a, b) => b.localeCompare(a));
  emptyBox.style.display = years.length ? "none" : "block";

  const latestYear = years[0];
  let latestMonth = null;
  if (latestYear) {
    latestMonth = Array.from(grouped.get(latestYear).keys()).sort((a, b) => b.localeCompare(a))[0];
  }

  years.forEach(year => {
    const yearDetails = document.createElement("details");
    yearDetails.open = query || year === latestYear;
    yearDetails.className = "year";

    const yearSummary = document.createElement("summary");
    const count = Array.from(grouped.get(year).values()).reduce((sum, arr) => sum + arr.length, 0);
    yearSummary.textContent = `${year}（${count}）`;
    yearDetails.appendChild(yearSummary);

    const months = Array.from(grouped.get(year).keys()).sort((a, b) => b.localeCompare(a));
    months.forEach(month => {
      const monthDetails = document.createElement("details");
      monthDetails.open = query || (year === latestYear && month === latestMonth);
      monthDetails.className = "month";

      const monthSummary = document.createElement("summary");
      monthSummary.textContent = `${month}（${grouped.get(year).get(month).length}）`;
      monthDetails.appendChild(monthSummary);

      grouped.get(year).get(month).forEach(g => {
        const p = g.properties;
        const item = document.createElement("div");
        item.className = "track-item";
        if (selectedIndex === g.index) item.classList.add("active");
        item.title = labelOf(g);

        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = g.color;

        const date = document.createElement("span");
        date.className = "track-date";
        date.textContent = p.date ? p.date.slice(5) : "--";

        const title = document.createElement("span");
        title.className = "track-title";
        title.textContent = p.title || "未命名轨迹";

        item.appendChild(swatch);
        item.appendChild(date);
        item.appendChild(title);
        item.onclick = () => selectTrack(g.index);

        monthDetails.appendChild(item);
      });

      yearDetails.appendChild(monthDetails);
    });

    trackTree.appendChild(yearDetails);
  });
}

async function loadTracks() {
  const res = await fetch('tracks.geojson?ts=' + Date.now());
  const geo = await res.json();

  const byTrack = new Map();
  for (const feature of geo.features) {
    const p = feature.properties || {};
    if (p.visible === false) continue;
    if (!byTrack.has(p.id)) {
      byTrack.set(p.id, { properties: p, features: [] });
    }
    byTrack.get(p.id).features.push(feature);
  }

  const tracks = Array.from(byTrack.values()).sort((a, b) => {
    const da = a.properties.date || "";
    const db = b.properties.date || "";
    return da.localeCompare(db) || a.properties.id - b.properties.id;
  });

  tracks.forEach((trk, i) => {
    const color = colors[i % colors.length];
    const lines = [];
    let totalPoints = 0;

    trk.features.forEach(feature => {
      const latlngs = feature.geometry.coordinates.map(c => [c[1], c[0]]);
      totalPoints += latlngs.length;
      allBounds.push(...latlngs);

      const line = L.polyline(latlngs, {
        color,
        weight: 3.5,
        opacity: 0.82,
        lineJoin: 'round',
        lineCap: 'round'
      }).addTo(map);

      line.on('click', () => selectTrack(i));
      lines.push(line);
    });

    const p = trk.properties;
    const label = p.date ? `${p.date}｜${p.title}` : p.title;
    lines.forEach(line => {
      line.bindPopup(`<b>${label}</b><br/>轨迹点：${totalPoints}`);
    });

    trackGroups.push({
      index: i,
      color,
      lines,
      properties: {
        ...p,
        points: totalPoints
      },
      temporarilyHidden: false
    });
  });

  renderTree();

  if (allBounds.length) {
    map.fitBounds(allBounds, { padding: [25, 25] });
  } else {
    map.setView([30.24, 120.10], 13);
  }
}

document.getElementById("showAllBtn").onclick = showAll;
document.getElementById("recentBtn").onclick = () => showRecent(10);
document.getElementById("clearBtn").onclick = clearSelection;
searchInput.addEventListener("input", renderTree);

loadTracks().catch(err => {
  console.error(err);
  alert("轨迹加载失败，请检查 tracks.geojson。");
});
</script>
</body>
</html>
