<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>西湖群山 GPX 轨迹图</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #map { width: 100vw; height: 100vh; }
  .panel { position: absolute; z-index: 1000; top: 14px; left: 14px; background: rgba(255,255,255,.92); padding: 12px 14px; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,.18); }
  .panel h1 { font-size: 18px; margin: 0; }
  .legend { position: absolute; z-index: 1000; bottom: 18px; left: 14px; background: rgba(255,255,255,.92); padding: 10px 12px; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,.16); max-height: 42vh; overflow: auto; font-size: 12px; display: flex; align-items: center; flex-wrap: wrap; max-width: 280px; }
  .legend b { width: 100%; margin-bottom: 4px; }
  .legend-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.95); color: #fff; font-size: 12px; font-weight: 700; margin: 4px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.28); }
  .legend-dot.active { outline: 3px solid #111; transform: scale(1.08); }
  .opacity-panel { position: absolute; z-index: 1000; right: 14px; bottom: 18px; background: rgba(255,255,255,.92); padding: 10px 12px; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,.16); font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .opacity-panel input { width: 140px; }
  .opacity-panel label { font-weight: 600; }
  .opacity-panel span { min-width: 36px; text-align: right; }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel"><h1>西湖群山 GPX 轨迹图</h1></div>
<div class="legend" id="legend"></div>
<div class="opacity-panel">
  <label for="baseOpacity">底图透明度</label>
  <input id="baseOpacity" type="range" min="0" max="100" value="45">
  <span id="baseOpacityValue">45%</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { preferCanvas: true, zoomControl: true });

const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  opacity: 0.45,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const baseOpacity = document.getElementById('baseOpacity');
const baseOpacityValue = document.getElementById('baseOpacityValue');
baseOpacity.addEventListener('input', () => {
  const value = Number(baseOpacity.value) / 100;
  baseLayer.setOpacity(value);
  baseOpacityValue.textContent = `${baseOpacity.value}%`;
});

const colors = [
  "#d73027", "#4575b4", "#1a9850", "#984ea3", "#ff7f00", "#a65628", "#f781bf",
  "#4daf4a", "#377eb8", "#e41a1c", "#666666", "#66c2a5", "#fc8d62", "#8da0cb",
  "#a6d854", "#ffd92f", "#e5c494", "#b3b3b3"
];

const legend = document.getElementById('legend');
legend.innerHTML = '<b>轨迹</b>';
const routeGroups = [];
let selectedTrack = null;
let allBounds = [];

function parseGpx(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, "application/xml");
  const segments = [];
  const trksegs = Array.from(xml.getElementsByTagNameNS("*", "trkseg"));
  trksegs.forEach(seg => {
    const pts = Array.from(seg.getElementsByTagNameNS("*", "trkpt")).map(pt => {
      const lat = Number(pt.getAttribute("lat"));
      const lon = Number(pt.getAttribute("lon"));
      if (Number.isFinite(lat) && Number.isFinite(lon)) return [lat, lon];
      return null;
    }).filter(Boolean);
    if (pts.length) segments.push(pts);
  });
  return segments;
}

function setTrackVisibility(trackIndex) {
  selectedTrack = trackIndex;
  routeGroups.forEach((group, i) => {
    const show = selectedTrack === null || selectedTrack === i;
    group.lines.forEach(line => {
      if (show) {
        if (!map.hasLayer(line)) line.addTo(map);
        line.setStyle({ weight: selectedTrack === i ? 5.5 : 3.5, opacity: selectedTrack === i ? 1 : 0.82 });
      } else {
        if (map.hasLayer(line)) map.removeLayer(line);
      }
    });
  });
  document.querySelectorAll('.legend-dot').forEach((el, i) => {
    el.classList.toggle('active', selectedTrack === i);
  });
}

async function loadTracks() {
  const res = await fetch('tracks.json?ts=' + Date.now());
  const manifest = await res.json();
  const visibleTracks = manifest.filter(t => t.visible !== false);

  for (let i = 0; i < visibleTracks.length; i++) {
    const trk = visibleTracks[i];
    const color = colors[i % colors.length];
    const gpxRes = await fetch(trk.file + '?ts=' + Date.now());
    const gpxText = await gpxRes.text();
    const segments = parseGpx(gpxText);
    const lines = [];
    let pointCount = 0;

    segments.forEach(seg => {
      pointCount += seg.length;
      allBounds.push(...seg);
      const line = L.polyline(seg, { color: color, weight: 3.5, opacity: 0.82, lineJoin: 'round', lineCap: 'round' }).addTo(map);
      line.on('click', () => setTrackVisibility(selectedTrack === i ? null : i));
      const label = trk.date ? `${trk.date}｜${trk.title}` : trk.title;
      line.bindPopup(`<b>轨迹 ${i + 1}</b><br/>${label}<br/>轨迹点：${pointCount || trk.points || ''}`);
      lines.push(line);
    });

    routeGroups.push({ lines });

    const dot = document.createElement('button');
    dot.className = 'legend-dot';
    dot.title = trk.date ? `${trk.date} ${trk.title}` : trk.title;
    dot.style.background = color;
    dot.textContent = i + 1;
    dot.onclick = () => setTrackVisibility(selectedTrack === i ? null : i);
    legend.appendChild(dot);
  }

  if (allBounds.length) map.fitBounds(allBounds, { padding: [25, 25] });
  else map.setView([30.24, 120.10], 13);
}

loadTracks().catch(err => {
  console.error(err);
  alert("轨迹加载失败，请检查 tracks.json 和 tracks/ 目录。");
});
</script>
</body>
</html>
