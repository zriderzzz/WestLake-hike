name: Build tracks GeoJSON

on:
  push:
    paths:
      - "tracks/**/*.gpx"
      - "scripts/build_tracks.py"
      - ".github/workflows/build-tracks.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build tracks.geojson and tracks.json
        run: python scripts/build_tracks.py

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update tracks data"
          file_pattern: tracks.geojson tracks.json tracks/*.gpx
